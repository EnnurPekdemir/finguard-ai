# ========================================
# SentinelBank FinGuard - Application Config
# ========================================

spring.application.name=finguard

# ----------------------------------------
# MySQL Veritabanı Bağlantı Ayarları
# ----------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/finguard_db?useSSL=false&serverTimezone=Europe/Istanbul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ennur1905.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------
# JPA / Hibernate Ayarları
# ----------------------------------------
# update: Mevcut tablolara dokunmadan sadece yeni değişiklikleri uygular
spring.jpa.hibernate.ddl-auto=update
# SQL sorgularını konsola yazdırır (geliştirme sırasında faydalı)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# MySQL 8 Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----------------------------------------
# Sunucu Ayarları
# ----------------------------------------
server.port=8081
